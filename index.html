<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="智能旅行规划器 — 选择城市、天数和预算，一键生成专属行程路线，支持地图可视化与费用估算">
  <meta name="theme-color" content="#2563eb">
  <title>旅行规划器 — 智能规划，说走就走</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
  <link rel="stylesheet" href="style.css?t=1713100003">
  <script src="https://map.qq.com/api/gljs?v=1.exp&key=GGHBZ-ELU6A-A5YKL-C3ITZ-4UEBF-PKBDJ&libraries=service"></script>
</head>
<body>

<!-- 左侧控制面板 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>🗺️ 旅行规划器</h1>
    <p class="subtitle">智能规划，说走就走</p>
  </div>

  <div class="config-section">
    <label class="config-label">🏙️ 目的地</label>
    <select id="citySelect" class="config-select" aria-label="选择目的地城市"></select>
  </div>

  <div class="config-section">
    <label class="config-label">📅 行程天数</label>
    <div class="days-control">
      <button class="days-btn" id="daysDown" aria-label="减少天数">−</button>
      <span class="days-value" id="daysValue" aria-live="polite">3</span>
      <button class="days-btn" id="daysUp" aria-label="增加天数">+</button>
      <span class="days-unit">天</span>
    </div>
  </div>

  <div class="config-section">
    <label class="config-label">💰 预算档位</label>
    <div class="budget-tabs">
      <button class="budget-tab" data-budget="舒适">舒适</button>
      <button class="budget-tab active" data-budget="标准">标准</button>
      <button class="budget-tab" data-budget="经济">经济</button>
    </div>
    <div class="budget-detail" id="budgetDetail"></div>
  </div>

  <div class="config-section">
    <label class="config-label">🚉 到达方式</label>
    <select id="arrivalSelect" class="config-select" aria-label="选择到达方式"></select>
  </div>

  <div class="config-section">
    <label class="config-label">🗂️ 图层控制</label>
    <div class="layer-toggles">
      <label class="layer-toggle">
        <input type="checkbox" id="layerSights" checked>
        <span class="toggle-icon sight-icon">🏛️</span>
        <span>景点</span>
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="layerHotels" checked>
        <span class="toggle-icon hotel-icon">🏨</span>
        <span>酒店</span>
      </label>
    </div>
  </div>

  <button class="plan-btn" id="planBtn">🚀 开始智能规划</button>

  <!-- 费用统计栏 -->
  <div class="cost-summary" id="costSummary" style="display:none;">
    <div class="cost-title">💰 费用估算</div>
    <div class="cost-grid">
      <div class="cost-item"><span>住宿</span><span id="costHotel">-</span></div>
      <div class="cost-item"><span>餐饮</span><span id="costFood">-</span></div>
      <div class="cost-item"><span>交通</span><span id="costTransport">-</span></div>
      <div class="cost-item"><span>门票</span><span id="costTicket">-</span></div>
    </div>
    <div class="cost-total">
      <span>总计</span><span id="costTotal">-</span>
    </div>
  </div>
</aside>

<!-- 地图区域 -->
<main class="map-area">
  <div id="mapContainer"></div>

  <!-- 加载动画 -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>正在智能规划路线...</p>
    </div>
  </div>
</main>

<!-- 右侧行程面板 -->
<aside class="itinerary-panel" id="itineraryPanel">
  <div class="panel-header">
    <h2>📋 行程安排</h2>
    <button class="panel-close" id="panelClose" aria-label="关闭行程面板">✕</button>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="empty-state">
      <p>点击「🚀 开始智能规划」<br>生成您的专属行程</p>
    </div>
  </div>
</aside>

<!-- POI 信息弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="poi-modal" id="poiModal">
    <button class="modal-close" id="modalClose" aria-label="关闭弹窗">✕</button>
    <div class="modal-header">
      <h3 id="modalName"></h3>
      <span class="modal-tag" id="modalTag"></span>
    </div>
    <div class="modal-body">
      <div class="modal-info-row">
        <span class="info-label">⭐ 评分</span>
        <span class="info-value" id="modalRating"></span>
      </div>
      <div class="modal-info-row">
        <span class="info-label">💰 价格</span>
        <span class="info-value" id="modalPrice"></span>
      </div>
      <div class="modal-info-row" id="modalDurationRow">
        <span class="info-label">⏱️ 游览</span>
        <span class="info-value" id="modalDuration"></span>
      </div>
      <div class="modal-info-row" id="modalStarsRow">
        <span class="info-label">🌟 星级</span>
        <span class="info-value" id="modalStars"></span>
      </div>
      <div class="modal-info-row" id="modalTelRow">
        <span class="info-label">📞 电话</span>
        <span class="info-value" id="modalTel"></span>
      </div>
      <div class="modal-info-row">
        <span class="info-label">📍 地址</span>
        <span class="info-value" id="modalAddress"></span>
      </div>
    </div>
  </div>
</div>

<script src="data.js?t=1713200001"></script>
<script src="app.js?t=1713200001"></script>
</body>
</html>
