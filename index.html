<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="智能旅行规划器 — 选择城市、天数和预算，一键生成专属行程路线，支持地图可视化与费用估算">
  <meta name="theme-color" content="#2563eb">
  <title>旅行规划器 — 智能规划，说走就走</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
  <link rel="stylesheet" href="style.css?t=1713100003">
  <script src="https://map.qq.com/api/gljs?v=1.exp&key=GGHBZ-ELU6A-A5YKL-C3ITZ-4UEBF-PKBDJ&libraries=service"></script>
</head>
<body>

<!-- 左侧控制面板 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>🗺️ 旅行规划器</h1>
    <p class="subtitle">智能规划，说走就走</p>
  </div>

  <div class="config-section">
    <label class="config-label">🏙️ 目的地</label>
    <select id="citySelect" class="config-select" aria-label="快速选择热门城市"></select>
    <div class="city-search-wrapper" id="citySearchWrapper" style="margin-top:8px;">
      <input type="text" id="cityInput" class="config-input" placeholder="输入城市名或任意地点..." autocomplete="off"
        aria-label="搜索目的地城市或地点">
      <span class="city-search-icon">🔍</span>
      <div class="city-suggestions" id="citySuggestions"></div>
    </div>
  </div>

  <div class="config-section">
    <label class="config-label">📅 行程天数</label>
    <div class="days-control">
      <button class="days-btn" id="daysDown" aria-label="减少天数">−</button>
      <span class="days-value" id="daysValue" aria-live="polite">3</span>
      <button class="days-btn" id="daysUp" aria-label="增加天数">+</button>
      <span class="days-unit">天</span>
    </div>
  </div>

  <div class="config-section">
    <label class="config-label">💰 预算档位</label>
    <div class="budget-tabs">
      <button class="budget-tab" data-budget="舒适">舒适</button>
      <button class="budget-tab active" data-budget="标准">标准</button>
      <button class="budget-tab" data-budget="经济">经济</button>
    </div>
    <div class="budget-detail" id="budgetDetail"></div>
  </div>

  <div class="config-section">
    <label class="config-label">🚉 到达方式</label>
    <select id="arrivalSelect" class="config-select" aria-label="选择到达方式"></select>
  </div>

  <div class="config-section">
    <label class="config-label">🗂️ 图层控制</label>
    <div class="layer-toggles">
      <label class="layer-toggle">
        <input type="checkbox" id="layerSights" checked>
        <span class="toggle-icon sight-icon">🏛️</span>
        <span>景点</span>
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="layerHotels" checked>
        <span class="toggle-icon hotel-icon">🏨</span>
        <span>酒店</span>
      </label>
    </div>
  </div>

  <button class="plan-btn" id="planBtn">🚀 开始智能规划</button>

  <!-- 费用统计栏 -->
  <div class="cost-summary" id="costSummary" style="display:none;">
    <div class="cost-title">💰 费用估算</div>
    <div class="cost-grid">
      <div class="cost-item"><span>住宿</span><span id="costHotel">-</span></div>
      <div class="cost-item"><span>餐饮</span><span id="costFood">-</span></div>
      <div class="cost-item"><span>交通</span><span id="costTransport">-</span></div>
      <div class="cost-item"><span>门票</span><span id="costTicket">-</span></div>
    </div>
    <div class="cost-total">
      <span>总计</span><span id="costTotal">-</span>
    </div>
    <div class="cost-disclaimer" id="costDisclaimer" style="display:none;">
      <p>⚠️ 以上为估算费用，实际费用以现场为准</p>
    </div>
  </div>
</aside>

<!-- 地图区域 -->
<main class="map-area">
  <div id="mapContainer"></div>

  <!-- 加载动画 -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>正在智能规划路线...</p>
    </div>
  </div>
</main>

<!-- 右侧行程面板 -->
<aside class="itinerary-panel" id="itineraryPanel">
  <div class="panel-header">
    <h2>📋 行程安排</h2>
    <div class="panel-actions">
      <button class="panel-action-btn" id="saveItineraryBtn" title="保存行程">💾</button>
      <button class="panel-action-btn" id="shareItineraryBtn" title="分享行程">🔗</button>
      <button class="panel-action-btn" id="exportPdfBtn" title="导出PDF">📄</button>
      <button class="panel-close" id="panelClose" aria-label="关闭行程面板">✕</button>
      </div>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="empty-state">
      <svg class="empty-state-illustration" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="180" height="144">
        <defs>
          <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#bfdbfe" />
            <stop offset="100%" stop-color="#eff6ff" />
          </linearGradient>
        </defs>
        <rect width="200" height="160" rx="16" fill="url(#skyGrad)" />
        <!-- 山 -->
        <polygon points="0,130 40,70 80,130" fill="#93c5fd" opacity=".6" />
        <polygon points="50,130 100,50 150,130" fill="#60a5fa" opacity=".7" />
        <polygon points="110,130 160,65 200,130" fill="#3b82f6" opacity=".5" />
        <!-- 太阳 -->
        <circle cx="160" cy="36" r="18" fill="#fbbf24" opacity=".9" />
        <circle cx="160" cy="36" r="22" fill="none" stroke="#fbbf24" stroke-width="2" opacity=".3" />
        <!-- 云 -->
        <ellipse cx="50" cy="38" rx="22" ry="10" fill="#fff" opacity=".8" />
        <ellipse cx="40" cy="34" rx="14" ry="8" fill="#fff" opacity=".7" />
        <!-- 路径 -->
        <path d="M30,140 Q60,110 100,115 T170,105" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6 4"
          stroke-linecap="round" opacity=".6" />
        <!-- 标记点 -->
        <circle cx="30" cy="140" r="5" fill="#2563eb" />
        <circle cx="100" cy="115" r="5" fill="#f97316" />
        <circle cx="170" cy="105" r="5" fill="#10b981" />
        <!-- 地面 -->
        <rect y="130" width="200" height="30" rx="0" fill="#d1fae5" opacity=".4" />
      </svg>
      <h3 class="empty-state-title">开启你的旅行规划</h3>
      <p class="empty-state-desc">选择目的地、天数和预算<br>点击「🚀 开始智能规划」生成专属行程</p>
      <div class="empty-state-steps">
        <span class="empty-step">① 选城市</span>
        <span class="empty-step-arrow">→</span>
        <span class="empty-step">② 设天数</span>
        <span class="empty-step-arrow">→</span>
        <span class="empty-step">③ 点规划</span>
      </div>
    </div>
  </div>
</aside>

<!-- POI 信息弹窗 -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="poi-modal" id="poiModal">
    <button class="modal-close" id="modalClose" aria-label="关闭弹窗">✕</button>
    <div class="modal-header">
      <h3 id="modalName"></h3>
      <span class="modal-tag" id="modalTag"></span>
    </div>
    <div class="modal-body">
      <div class="modal-info-row">
        <span class="info-label">⭐ 评分</span>
        <span class="info-value" id="modalRating"></span>
      </div>
      <div class="modal-info-row">
        <span class="info-label">💰 价格</span>
        <span class="info-value" id="modalPrice"></span>
      </div>
      <div class="modal-info-row" id="modalDurationRow">
        <span class="info-label">⏱️ 游览</span>
        <span class="info-value" id="modalDuration"></span>
      </div>
      <div class="modal-info-row" id="modalStarsRow">
        <span class="info-label">🌟 星级</span>
        <span class="info-value" id="modalStars"></span>
      </div>
      <div class="modal-info-row" id="modalTelRow">
        <span class="info-label">📞 电话</span>
        <span class="info-value" id="modalTel"></span>
      </div>
      <div class="modal-info-row">
        <span class="info-label">📍 地址</span>
        <span class="info-value" id="modalAddress"></span>
      </div>
    </div>
  </div>
</div>

<!-- Toast 通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://unpkg.com/supercluster@8.0.1/dist/supercluster.min.js"
  onerror="document.head.appendChild(Object.assign(document.createElement('script'),{src:'https://cdn.jsdelivr.net/npm/supercluster@8.0.1/dist/supercluster.min.js'}))"></script>
<script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"
  onerror="document.head.appendChild(Object.assign(document.createElement('script'),{src:'https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js'}))"></script>
<script src="i18n.js?t=1713200001"></script>
<script src="data.js?t=1713200001"></script>
<script src="app.js?t=1713200001"></script>
</body>
</html>
